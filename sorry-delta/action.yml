name: "Sorry Delta"
description: >
  Compute the sorry-tainted declaration delta between a base and head manifest.
  Produces a markdown section suitable for inclusion in a PR comment.
author: "Beneficial AI Foundation"

branding:
  icon: "git-pull-request"
  color: "orange"

inputs:
  base-manifest:
    description: "Path to the base sorry-manifest.txt (may not exist if no baseline is available)"
    required: true
  head-manifest:
    description: "Path to the head sorry-manifest.txt"
    required: true
  fail-on-new:
    description: "Exit with error if new sorry-tainted declarations are found"
    required: false
    default: "false"
  include-prefix:
    description: >
      Comma- or whitespace-separated module prefix(es) to report on, e.g.
      hand-written code ("MyProject").  When set, the delta and the
      should-comment signal cover only these modules, so sorries in
      generated/extracted libraries are ignored.  Empty (default) reports on
      all modules.
    required: false
    default: ""
  output-path:
    description: "Path for the output markdown section"
    required: false
    default: ".sorry-delta-section.md"

outputs:
  new-count:
    description: "Number of new sorry-tainted declarations (scoped to include-prefix when set)"
    value: ${{ steps.diff.outputs.new-count }}
  removed-count:
    description: "Number of removed sorry-tainted declarations (scoped to include-prefix when set)"
    value: ${{ steps.diff.outputs.removed-count }}
  total-count:
    description: "Total sorry-tainted declarations in head (scoped to include-prefix when set)"
    value: ${{ steps.diff.outputs.total-count }}
  comment-path:
    description: "Path to the generated markdown section"
    value: ${{ steps.diff.outputs.comment-path }}
  should-comment:
    description: >
      "true" when a PR comment is warranted.  With include-prefix set, true
      only when a new sorry was introduced in those modules; otherwise always
      true.
    value: ${{ steps.diff.outputs.should-comment }}

runs:
  using: "composite"
  steps:
    - name: Compute sorry delta
      id: diff
      shell: bash
      env:
        INCLUDE_PREFIX: ${{ inputs.include-prefix }}
      run: |
        FAIL_FLAG=""
        if [ "${{ inputs.fail-on-new }}" = "true" ]; then
          FAIL_FLAG="--fail-on-new"
        fi
        python3 "${{ github.action_path }}/sorry-diff.py" \
          "${{ inputs.base-manifest }}" \
          "${{ inputs.head-manifest }}" \
          --output "${{ inputs.output-path }}" \
          --summary \
          --include-prefix "$INCLUDE_PREFIX" \
          $FAIL_FLAG
