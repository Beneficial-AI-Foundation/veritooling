# Reusable workflow: Build a Lean project and generate verification audit
# artifacts (sorry manifest, specs delta).
#
# Consumers call this from their own workflow:
#
#   jobs:
#     build:
#       uses: Beneficial-AI-Foundation/veritooling/.github/workflows/lean-build-audit.yml@v1
#       with:
#         sorry-backend: probe

name: Lean Build & Audit

on:
  workflow_call:
    inputs:
      sorry-backend:
        description: "Sorry audit backend: collectaxioms or probe"
        type: string
        required: false
        default: "probe"
      root-module:
        description: "Root module name(s), comma- or whitespace-separated (collectaxioms backend; if empty, auto-detected from lakefile.toml defaultTargets)"
        type: string
        required: false
        default: ""
      exclude-module:
        description: "Module(s) to omit from the detailed audit, comma- or whitespace-separated (optional, collectaxioms only)"
        type: string
        required: false
        default: ""
      specs-delta-mode:
        description: "Specs delta mode: git-diff, probe, or off"
        type: string
        required: false
        default: "off"
      specs-paths:
        description: "Comma-separated specs directory paths (git-diff mode only)"
        type: string
        required: false
        default: ""
      fail-on-new-sorry:
        description: "Fail the build if new sorries are introduced"
        type: boolean
        required: false
        default: false
      lean-build-args:
        description: "Extra arguments for lake build (passed to lean-action)"
        type: string
        required: false
        default: ""
      lake-package-directory:
        description: "Directory containing the Lake package"
        type: string
        required: false
        default: "."

env:
  LEAN_ABORT_ON_PANIC: 1

jobs:
  build-and-audit:
    name: Build & Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Lean project
        uses: leanprover/lean-action@v1
        with:
          build: true
          test: false
          lint: false
          use-mathlib-cache: auto
          build-args: ${{ inputs.lean-build-args }}
          lake-package-directory: ${{ inputs.lake-package-directory }}

      # --- Sorry audit (restore baseline, audit, cache, specs delta, upload) ---
      # All orchestration lives in the sorry-audit composite action so it is
      # defined once and shared with consumers that compose it directly.
      - name: Sorry audit
        uses: Beneficial-AI-Foundation/veritooling/actions/sorry-audit@v1
        with:
          backend: ${{ inputs.sorry-backend }}
          root-module: ${{ inputs.root-module }}
          exclude-module: ${{ inputs.exclude-module }}
          specs-delta-mode: ${{ inputs.specs-delta-mode }}
          specs-paths: ${{ inputs.specs-paths }}
