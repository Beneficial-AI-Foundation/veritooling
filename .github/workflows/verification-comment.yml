# Reusable workflow: Post a Verification Delta comment on a PR.
#
# Triggered by workflow_run after the build workflow completes.
# Runs in the base repository context, so the GITHUB_TOKEN has write
# access even for fork PRs.
#
# Consumers add this to their repo:
#
#   name: Verification Comment
#   on:
#     workflow_run:
#       workflows: ["Lean CI"]
#       types: [completed]
#   jobs:
#     comment:
#       uses: Beneficial-AI-Foundation/veritooling/.github/workflows/verification-comment.yml@v1

name: Verification Comment

on:
  workflow_call:
    inputs:
      artifact-name:
        description: "Name of the artifact uploaded by the build workflow"
        type: string
        required: false
        default: "verification-audit"
      fail-on-new-sorry:
        description: "Fail if new sorries are introduced"
        type: boolean
        required: false
        default: false
      include-prefix:
        description: >
          Module prefix(es) for hand-written code (comma/whitespace-separated,
          e.g. "MyProject").  When set, a comment is posted only when a new
          sorry is introduced in these modules; sorries in generated/extracted
          libraries are ignored.  Empty (default) always posts the delta
          comment.
        type: string
        required: false
        default: ""

jobs:
  report:
    name: Report Verification Delta
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read

    steps:
      - name: Download verification artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate PR number
        id: pr
        shell: bash
        run: |
          if [ ! -f artifacts/pr-number.txt ]; then
            echo "::error::pr-number.txt not found in artifacts"
            exit 1
          fi
          PR_NUM=$(cat artifacts/pr-number.txt)
          if ! [[ "$PR_NUM" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid PR number: $PR_NUM"
            exit 1
          fi
          echo "number=$PR_NUM" >> "$GITHUB_OUTPUT"

      - name: Compute sorry delta
        id: sorry
        uses: Beneficial-AI-Foundation/veritooling/sorry-delta@v1
        with:
          base-manifest: artifacts/sorry-manifest-base.txt
          head-manifest: artifacts/sorry-manifest.txt
          fail-on-new: ${{ inputs.fail-on-new-sorry }}
          include-prefix: ${{ inputs.include-prefix }}

      - name: Combine verification delta report
        if: steps.sorry.outputs.should-comment == 'true'
        uses: Beneficial-AI-Foundation/veritooling/verification-delta-report@v1
        with:
          sorry-delta-path: .sorry-delta-section.md
          specs-delta-path: artifacts/.specs-delta-section.md

      - name: Post PR comment
        if: steps.sorry.outputs.should-comment == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: verification-delta
          number: ${{ steps.pr.outputs.number }}
          path: .verification-delta-comment.md

      # When commenting is gated off (e.g. a later push removed the
      # hand-written sorry), mark any earlier comment outdated instead of
      # leaving stale content on the PR.
      - name: Hide stale PR comment
        if: steps.sorry.outputs.should-comment != 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: verification-delta
          number: ${{ steps.pr.outputs.number }}
          hide: true
          hide_classify: OUTDATED
