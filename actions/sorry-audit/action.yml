name: "Sorry Audit (pipeline)"
description: >
  End-to-end sorry audit for an already-built Lean project: restore the base
  branch's manifest, generate the head manifest (collectaxioms or probe
  backend), cache it on the default branch, optionally compute the specs delta,
  and upload the artifacts the verification-comment workflow consumes.

  This bundles the orchestration around the per-backend audit actions into a
  single step.  Requires a prior `lake build`.  Run it in a build job with no
  write permissions; the artifacts it uploads are consumed by a separate
  reporting job.
author: "Beneficial AI Foundation"

branding:
  icon: "search"
  color: "blue"

inputs:
  backend:
    description: "Sorry audit backend: collectaxioms or probe"
    required: false
    default: "probe"
  root-module:
    description: >
      Root module(s) for the collectaxioms backend, comma- or
      whitespace-separated.  If empty, auto-detected from lakefile.toml
      defaultTargets.  Ignored by the probe backend.
    required: false
    default: ""
  exclude-module:
    description: "Module(s) to omit from the detailed audit (collectaxioms only)"
    required: false
    default: ""
  specs-delta-mode:
    description: "Specs delta mode: off or git-diff"
    required: false
    default: "off"
  specs-paths:
    description: "Comma-separated specs directory paths (git-diff mode only)"
    required: false
    default: ""
  manifest-path:
    description: "Path of the generated head manifest"
    required: false
    default: "sorry-manifest.txt"
  annotate-new-sorries:
    description: >
      On pull requests, emit a GitHub ::warning annotation per newly-introduced
      sorry.  This runs in the (pull_request-triggered) build job, so file/line
      annotations render inline on the PR diff -- unlike the sticky comment,
      which is posted from a workflow_run job and cannot annotate the diff.
      Requires the probe backend (collectaxioms manifests carry no file:line).
    required: false
    default: "false"
  extract-args:
    description: >
      Extra arguments forwarded to `probe-lean extract` (probe backend only),
      e.g. `--library Lib1,Lib2` to build AND restrict the audit to specific
      libraries by module-name prefix.  Use this when the project builds extra
      libraries (e.g. a docs/blueprint library) whose dependencies aren't built
      during the audit, so the auto-detected "analyze everything" default would
      try to import unbuilt modules.  Empty (default) audits every built module.
    required: false
    default: ""
  include-prefix:
    description: >
      Module prefix(es) to scope the annotations to (comma/whitespace-
      separated), e.g. hand-written code.  Empty (default) derives the scope
      from the lakefile's defaultTargets (lean_lib targets).
    required: false
    default: ""
  artifact-name:
    description: "Name of the uploaded artifact bundle"
    required: false
    default: "verification-audit"

outputs:
  sorry-count:
    description: "Total sorry-tainted declaration count"
    value: ${{ steps.collectaxioms.outputs.sorry-count || steps.probe.outputs.sorry-count }}

runs:
  using: "composite"
  steps:
    - name: Restore base sorry manifest
      if: github.event_name == 'pull_request'
      uses: actions/cache/restore@v4
      with:
        key: sorry-manifest-${{ github.event.pull_request.base.ref }}-${{ github.event.pull_request.base.sha }}
        restore-keys: |
          sorry-manifest-${{ github.event.repository.default_branch }}-
        path: ${{ inputs.manifest-path }}

    - name: Prepare base manifest
      if: github.event_name == 'pull_request'
      shell: bash
      run: '[ -f "${{ inputs.manifest-path }}" ] && mv "${{ inputs.manifest-path }}" sorry-manifest-base.txt || true'

    - name: Sorry audit (collectaxioms)
      id: collectaxioms
      if: inputs.backend == 'collectaxioms'
      uses: Beneficial-AI-Foundation/veritooling/actions/sorry-audit-collectaxioms@v1
      with:
        root-module: ${{ inputs.root-module }}
        exclude-module: ${{ inputs.exclude-module }}
        manifest-path: ${{ inputs.manifest-path }}

    - name: Sorry audit (probe-lean)
      id: probe
      if: inputs.backend == 'probe'
      uses: Beneficial-AI-Foundation/veritooling/actions/sorry-audit-probe@v1
      with:
        manifest-path: ${{ inputs.manifest-path }}
        extract-args: ${{ inputs.extract-args }}

    # Scope annotations to hand-written code.  When include-prefix is unset,
    # derive it from the lakefile's defaultTargets (the lean_lib targets), so
    # the default scope matches what the backend actually audits.
    - name: Determine annotation scope
      id: scope
      if: github.event_name == 'pull_request' && inputs.annotate-new-sorries == 'true'
      shell: bash
      env:
        INCLUDE_PREFIX: ${{ inputs.include-prefix }}
      run: |
        PREFIX="${INCLUDE_PREFIX}"
        if [ -z "${PREFIX// }" ] && [ -f lakefile.toml ]; then
          DT_NAMES=$(awk '
            /^[[:space:]]*defaultTargets[[:space:]]*=/ { flag=1 }
            flag                                       { print }
            /\]/                                       { if (flag) flag=0 }
          ' lakefile.toml | grep -oE '"[^"]+"' | tr -d '"')
          LIB_NAMES=$(awk '
            /^\[\[lean_lib\]\]/ { inlib=1; next }
            /^\[\[/             { inlib=0 }
            inlib && /^[[:space:]]*name[[:space:]]*=/ {
              l=$0; sub(/^[^"]*"/,"",l); sub(/".*/,"",l); print l
            }
          ' lakefile.toml)
          DETECTED=""
          for t in $DT_NAMES; do
            for lib in $LIB_NAMES; do
              if [ "$t" = "$lib" ]; then
                [ -n "$DETECTED" ] && DETECTED="${DETECTED},"
                DETECTED="${DETECTED}${t}"
                break
              fi
            done
          done
          PREFIX="$DETECTED"
          [ -n "$PREFIX" ] && echo "Derived annotation scope from defaultTargets: $PREFIX"
        fi
        echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"

    # Emit inline ::warning annotations for newly-introduced sorries.  Runs in
    # this (pull_request) job so the annotations attach to the PR head SHA and
    # render on the diff; sorry-manifest-base.txt is the restored baseline (no
    # baseline -> no new sorries -> no annotations).
    - name: Annotate new sorries
      if: github.event_name == 'pull_request' && inputs.annotate-new-sorries == 'true'
      uses: Beneficial-AI-Foundation/veritooling/actions/sorry-delta@v1
      with:
        base-manifest: sorry-manifest-base.txt
        head-manifest: ${{ inputs.manifest-path }}
        include-prefix: ${{ steps.scope.outputs.prefix }}
        annotate: "true"

    - name: Save sorry manifest to cache
      if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
      uses: actions/cache/save@v4
      with:
        key: sorry-manifest-${{ github.ref_name }}-${{ github.sha }}
        path: ${{ inputs.manifest-path }}

    - name: Specs delta (git-diff)
      if: inputs.specs-delta-mode == 'git-diff' && github.event_name == 'pull_request'
      uses: Beneficial-AI-Foundation/veritooling/actions/specs-delta@v1
      with:
        mode: git-diff
        specs-paths: ${{ inputs.specs-paths }}
        base-ref: ${{ github.event.pull_request.base.sha }}

    - name: Save PR number
      if: github.event_name == 'pull_request'
      shell: bash
      run: echo "${{ github.event.pull_request.number }}" > pr-number.txt

    - name: Upload verification artifacts
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          ${{ inputs.manifest-path }}
          sorry-manifest-base.txt
          specs-delta.json
          .specs-delta-section.md
          pr-number.txt
        if-no-files-found: ignore
        retention-days: 1
