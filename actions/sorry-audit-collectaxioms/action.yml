name: "Sorry Audit (collectAxioms)"
description: >
  Generate a sorry manifest using Lean's collectAxioms API for transitive
  axiom-closure analysis.  Detects sorry, trustCompiler, and custom axioms.
  Requires a prior `lake build`.
author: "Beneficial AI Foundation"

branding:
  icon: "search"
  color: "blue"

inputs:
  root-module:
    description: >
      Root module name(s) to import and scan.  Accepts one or several,
      separated by commas or whitespace (e.g. "MyProject" or
      "MyProject,Extracted").  A declaration counts as in-project when its
      module equals or descends from any of these roots.  Use multiple roots
      for projects that keep extracted code in a separate top-level library.

      If omitted, the roots are derived from the `defaultTargets` of a
      `lakefile.toml` in the working directory, keeping only `lean_lib`
      targets (`lean_exe` targets are not library roots).  Projects using
      `lakefile.lean`, or whose default build targets differ from the modules
      they want audited, must set this explicitly.
    required: false
    default: ""
  exclude-module:
    description: >
      Module name(s) to omit from the detailed per-declaration audit
      (Sections 1 and 2).  Accepts one or several, separated by commas or
      whitespace (e.g. "Extracted" or "Extracted,Generated").  A module is
      excluded when it equals or descends from any of these.  Use it to keep
      churn-heavy generated/extracted code out of the detailed view; such
      code is still scanned and still appears in the full-project summary and
      the sorry manifest.  If empty, the detailed audit covers every
      in-project module.
    required: false
    default: ""
  manifest-path:
    description: "Output path for the sorry manifest"
    required: false
    default: "sorry-manifest.txt"

outputs:
  manifest-path:
    description: "Path to the generated sorry manifest"
    value: ${{ inputs.manifest-path }}
  sorry-count:
    description: "Total sorry-tainted declaration count"
    value: ${{ steps.audit.outputs.sorry-count }}

runs:
  using: "composite"
  steps:
    - name: Generate Audit.lean from template
      id: generate
      shell: bash
      env:
        ROOT_MODULE: ${{ inputs.root-module }}
        EXCLUDE_MODULE: ${{ inputs.exclude-module }}
        MANIFEST_PATH: ${{ inputs.manifest-path }}
      run: |
        TEMPLATE="${{ github.action_path }}/Audit.lean.template"
        OUTPUT=".veritooling-Audit.lean"

        # When root-module is not given, derive it from the lakefile's
        # defaultTargets, keeping only lean_lib targets (lean_exe targets are
        # not library roots).
        if [ -z "${ROOT_MODULE// }" ]; then
          LAKEFILE="lakefile.toml"
          if [ ! -f "$LAKEFILE" ]; then
            echo "::error::root-module not set and $LAKEFILE not found — pass root-module explicitly (lakefile.lean projects are not auto-detected)"
            exit 1
          fi
          # defaultTargets array contents (handles single- and multi-line forms).
          DT_NAMES=$(awk '
            /^[[:space:]]*defaultTargets[[:space:]]*=/ { flag=1 }
            flag                                       { print }
            /\]/                                       { if (flag) flag=0 }
          ' "$LAKEFILE" | grep -oE '"[^"]+"' | tr -d '"')
          # lean_lib target names.
          LIB_NAMES=$(awk '
            /^\[\[lean_lib\]\]/ { inlib=1; next }
            /^\[\[/             { inlib=0 }
            inlib && /^[[:space:]]*name[[:space:]]*=/ {
              l=$0; sub(/^[^"]*"/,"",l); sub(/".*/,"",l); print l
            }
          ' "$LAKEFILE")
          # Keep the defaultTargets that are lean_lib targets, preserving order.
          DETECTED=""
          for t in $DT_NAMES; do
            for lib in $LIB_NAMES; do
              if [ "$t" = "$lib" ]; then
                [ -n "$DETECTED" ] && DETECTED="${DETECTED},"
                DETECTED="${DETECTED}${t}"
                break
              fi
            done
          done
          if [ -z "$DETECTED" ]; then
            echo "::error::could not derive root-module from $LAKEFILE defaultTargets (no matching lean_lib targets) — pass root-module explicitly"
            exit 1
          fi
          echo "Derived root-module from $LAKEFILE defaultTargets: $DETECTED"
          ROOT_MODULE="$DETECTED"
        fi

        # Split root-module on commas and whitespace into a list of roots.
        read -r -a ROOTS <<< "$(echo "$ROOT_MODULE" | tr ',' ' ')"
        if [ "${#ROOTS[@]}" -eq 0 ]; then
          echo "::error::root-module is required (one or more module names)"
          exit 1
        fi

        # Build the Lean import block (one line per root) and the
        # `#[`A, `B]` name-array contents the template expects.
        IMPORTS=""
        NAMES=""
        for r in "${ROOTS[@]}"; do
          [ -z "$r" ] && continue
          IMPORTS="${IMPORTS}import ${r}\n"
          [ -n "$NAMES" ] && NAMES="${NAMES}, "
          NAMES="${NAMES}\`${r}"
        done

        # Split exclude-module on commas and whitespace into the matching
        # `#[`A, `B]` name-array contents (empty -> empty array).
        read -r -a EXCLUDES <<< "$(echo "$EXCLUDE_MODULE" | tr ',' ' ')"
        EXCLUDE_NAMES=""
        for e in "${EXCLUDES[@]}"; do
          [ -z "$e" ] && continue
          [ -n "$EXCLUDE_NAMES" ] && EXCLUDE_NAMES="${EXCLUDE_NAMES}, "
          EXCLUDE_NAMES="${EXCLUDE_NAMES}\`${e}"
        done

        # Substitute inline tokens with sed; expand the multi-line import
        # block with awk (sed handles multi-line replacements awkwardly).
        sed \
          -e "s/__EXCLUDE_NAMES__/${EXCLUDE_NAMES}/g" \
          -e "s|__MANIFEST_PATH__|${MANIFEST_PATH}|g" \
          -e "s/__ROOT_NAMES__/${NAMES}/g" \
          "$TEMPLATE" \
          | awk -v imp="$IMPORTS" '{ gsub(/__ROOT_IMPORTS__/, imp); print }' \
          > "$OUTPUT"

        echo "script=$OUTPUT" >> "$GITHUB_OUTPUT"

    - name: Run axiom audit
      id: audit
      shell: bash
      run: |
        lake env lean "${{ steps.generate.outputs.script }}"

        MANIFEST="${{ inputs.manifest-path }}"
        if [ -f "$MANIFEST" ]; then
          COUNT=$(grep -cv '^#\|^$' "$MANIFEST" 2>/dev/null || echo 0)
        else
          COUNT=0
        fi
        echo "sorry-count=$COUNT" >> "$GITHUB_OUTPUT"

    - name: Cleanup generated script
      if: always()
      shell: bash
      run: rm -f .veritooling-Audit.lean
